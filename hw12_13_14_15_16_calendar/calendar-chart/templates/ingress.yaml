{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calendar-ingress
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calendar
                port:
                  number: {{ .Values.ingress.httpPort }}
          - path: /grpc
            pathType: Prefix
            backend:
              service:
                name: calendar
                port:
                  number: {{ .Values.ingress.grpcPort }}
{{- end }}